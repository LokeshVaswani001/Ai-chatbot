<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">

    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <rect x="3" y="3" width="18" height="14" rx="3"/>
          <path d="M8 21h8M12 17v4"/>
          <circle cx="8.5" cy="10" r="1.5" fill="white" stroke="none"/>
          <circle cx="15.5" cy="10" r="1.5" fill="white" stroke="none"/>
        </svg>
      </div>
      <div class="brand-text">
        <h2>AI Chatbot</h2>
        <p>Powered by Groq</p>
      </div>
    </div>

    <div class="new-chat-wrap">
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Chat
      </button>
    </div>

    <div class="sidebar-section-label">Recent Chats</div>
    <div class="chat-list" id="chatList">
      <div class="empty-state">No conversations yet.<br/>Start chatting below!</div>
    </div>

    <div class="sidebar-footer">
      <div class="setting-row" onclick="toggleTheme()">
        <span class="setting-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </span>
        <span>Dark Mode</span>
        <label class="toggle" onclick="event.stopPropagation()">
          <input type="checkbox" id="themeToggle" checked onchange="toggleTheme()"/>
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row" onclick="clearAll()">
        <span class="setting-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </span>
        <span>Clear Conversations</span>
      </div>
      <div class="user-row">
        <div class="user-avatar">U</div>
        <div class="user-info"><p>User</p><span>user@email.com</span></div>
      </div>
    </div>
  </aside>

  <!-- ══ MAIN CHAT ══ -->
  <main class="chat-main">

    <!-- Professional Topbar -->
    <div class="chat-topbar">
      <div class="topbar-left">
        <div class="topbar-avatar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <rect x="3" y="3" width="18" height="14" rx="3"/>
            <path d="M8 21h8M12 17v4"/>
            <circle cx="8.5" cy="10" r="1.5" fill="white" stroke="none"/>
            <circle cx="15.5" cy="10" r="1.5" fill="white" stroke="none"/>
          </svg>
        </div>
        <div class="topbar-info">
          <h3 id="chatTitle">AI Assistant</h3>
          <p class="topbar-sub">Groq · LLaMA 3.3 · Fast AI</p>
        </div>
      </div>
      <div class="topbar-badge">
        <span class="badge-dot"></span>
        Active
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messagesArea"></div>

    <!-- Feature 4: Error Bar -->
    <div class="error-bar" id="errorBar"></div>

    <div class="disclaimer">AI responses may be inaccurate. Please verify important information.</div>

    <!-- Feature 1: Input -->
    <div class="input-bar">
      <div class="input-wrap">
        <input type="text" id="userInput" placeholder="Type your message here..." autocomplete="off"/>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Send
        </button>
      </div>
    </div>

  </main>
</div>
<script src="script.js"></script>
</body>
</html>
